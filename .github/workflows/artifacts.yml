name: Artifact Demo

on:
  push:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Report
        run: |
          echo "GitHub Actions Bootcamp" > report.txt
          echo "Student: Melz" >> report.txt
          echo "Module: 11" >> report.txt

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: bootcamp-report
          path: report.txt