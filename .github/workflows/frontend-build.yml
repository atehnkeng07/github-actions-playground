name: Frontend Build Simulation

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Simulate Frontend Build
        run: |
          mkdir dist

          echo "<html><body><h1>RideReady</h1></body></html>" > dist/index.html

          echo "console.log('RideReady Loaded');" > dist/app.js

          echo "body { background: white; }" > dist/styles.css

      - name: Verify Build Folder
        run: |
          echo "Contents of dist:"
          ls -R dist

      - name: Upload Build Folder
        uses: actions/upload-artifact@v4
        with:
          name: ride-ready-build
          path: dist/